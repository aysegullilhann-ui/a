    <style>
        :root {
            --pink: #ffb7c5;
            --dark: #0b0c10;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--dark); 
            color: white; 
            overflow-x: hidden; 
            scroll-behavior: smooth;
        }

        /* 🌸 Çiçek Yağmuru */
        .flower {
            position: fixed;
            top: -50px;
            font-size: 20px;
            z-index: -1;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* 🐱 GERÇEKÇİ VE PATİ ATAN KEDİ */
        .cat-container {
            position: fixed;
            bottom: 0;
            right: 15px;
            width: 160px;
            z-index: 1000;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .cat-container img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 15px var(--pink));
        }

        .cat-container:hover {
            transform: scale(1.05) translateY(-5px);
        }

        /* Konuşma Balonu */
        .bubble {
            position: absolute;
            top: -50px;
            right: 20px;
            background: white;
            color: #333;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            white-space: nowrap;
            border: 2px solid var(--pink);
            box-shadow: 0 5px 20px rgba(255,183,197,0.4);
        }

        /* 🎀 Navigasyon */
        nav {
            padding: 15px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 1001;
            border-bottom: 2px solid var(--pink);
        }
        .logo { font-family: 'Dancing Script', cursive; color: var(--pink); font-size: 1.8rem; }
        .nav-links a { color: var(--pink); margin-left: 20px; font-size: 1.5rem; transition: 0.3s; }
        .nav-links a:hover { color: white; transform: scale(1.2); }

        section { padding: 120px 10%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        
        .hero { text-align: center; }
        .hero h1 { font-size: 3.5rem; color: var(--pink); margin-bottom: 10px; min-height: 90px; }
        .hero p { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: #ccc; }

            text-align: center;
            backdrop-filter: blur(5px);
        }
