<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ayşe Gül | Flower & Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background-color: #0f0f1a; 
            color: #ffb7c5; 
            font-family: sans-serif; 
            margin: 0; 
            text-align: center;
            overflow-x: hidden;
        }
        /* 🌸 Çiçekler */
        .flower { position: fixed; top: -50px; animation: fall 5s linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* 🐱 Kedi */
        .cat-container { position: fixed; bottom: 10px; right: 10px; width: 150px; cursor: pointer; z-index: 999; }
        .cat-container img { width: 100%; filter: drop-shadow(0 0 10px #ffb7c5); }

        /* 💬 Balon */
        .bubble { 
            position: absolute; top: -50px; right: 10px; background: white; color: black; 
            padding: 10px; border-radius: 15px; display: none; border: 2px solid #ffb7c5;
        }

        nav { padding: 20px; border-bottom: 2px solid #ffb7c5; background: #000; }
        .card { background: #1a1a2e; margin: 20px; padding: 20px; border-radius: 15px; border: 1px solid #ffb7c5; }
        a { color: #ffb7c5; text-decoration: none; margin: 0 10px; font-size: 20px; }
    </style>
</head>
<body>

    <nav>
        <h2>Ayşe Gül Ilhan</h2>
        <a href="mailto:aysegulilhan@gmail.com"><i class="fas fa-envelope"></i></a>
        <a href="https://www.instagram.com/aysegulilh1/"><i class="fab fa-instagram"></i></a>
    </nav>

    <div class="cat-container" onclick="kediKonustur()">
        <div id="balon" class="bubble">Miyav! ✨</div>
        <img src="https://media.giphy.com/media/ByX7I5N4tGkXclE62F/giphy.gif" alt="Kedi">
    </div>

    <h1>Hoş Geldiniz! 🌸</h1>
    <p>Geleceğin Yazılımcısı & Batman'ın Kedi Severi</p>

    <div class="card">
        <h3>📊 Yeteneklerim</h3>
        <p>Web Tasarım | Python | Çiçekler & Kediler</p>
    </div>

    <div class="card">
        <h3>📬 İletişim</h3>
        <p>Instagram: @aysegulilh1</p>
        <p>Email: aysegulilhan@gmail.com</p>
    </div>

    <script>
        // Kedi Konuşturma
        function kediKonustur() {
            const mesajlar = ["Miyav! 🐾", "Ayşe Gül çok iyi kod yazıyor!", "Batman'dan selamlar! 🌸", "Bana tıkla! ✨"];
            const balon = document.getElementById("balon");
            balon.innerText = mesajlar[Math.floor(Math.random() * mesajlar.length)];
            balon.style.display = "block";
            setTimeout(() => { balon.style.display = "none"; }, 3000);
        }

        // Çiçek Yağmuru
        setInterval(() => {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.innerHTML = "🌸";
            flower.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(flower);
            setTimeout(() => flower.remove(), 5000);
        }, 1000);
    </script>
</body>
</html>
