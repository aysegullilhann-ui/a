<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayşe Gül | Flower & Tech</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink: #ffb7c5; /* Kiraz çiçeği pembesi */
            --mint: #66fcf1;
            --dark: #0b0c10;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: var(--dark); 
            color: white; 
            overflow-x: hidden; 
            scroll-behavior: smooth;
        }

        /* 🌸 Arka Planda Düşen Çiçekler */
        .flower {
            position: fixed;
            top: -50px;
            font-size: 20px;
            z-index: -1;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* 🐱 Sağ Altta Bekleyen Kedi */
        .cat-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 50px;
            z-index: 1000;
            cursor: pointer;
            transition: 0.3s;
            filter: drop-shadow(0 0 10px var(--pink));
        }
        .cat-box:hover { transform: scale(1.3) rotate(-15deg); }

        /* 🎀 Navigasyon */
        nav {
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 999;
            border-bottom: 2px solid var(--pink);
        }
        .logo { font-family: 'Dancing Script', cursive; color: var(--pink); font-size: 1.8rem; }

        /* ✨ Bölümler */
        section { padding: 120px 10%; min-height: 100vh; }
        
        .hero { text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .hero h1 { font-size: 3.5rem; color: var(--pink); margin-bottom: 10px; min-height: 80px; }
        .hero p { font-family: 'Dancing Script', cursive; font-size: 1.6rem; color: #ccc; }

        /* 📊 Tablo Tasarımı */
        .table-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--pink);
            margin-top: 30px;
            transition: 0.4s;
        }
        .table-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(255, 183, 197, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: rgba(255, 183, 197, 0.2);
            color: var(--pink);
            padding: 15px;
            text-align: left;
        }

            padding: 15
