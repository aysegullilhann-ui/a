<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayşe Gül | Flower & Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ffb7c5; --dark: #0b0c10; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0b0c10 !important; color: white; overflow-x: hidden; }
        
        /* Navigasyon */
        nav { padding: 20px 10%; display: flex; justify-content: space-between; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--pink); position: fixed; width: 100%; z-index: 1000; }
        .logo { font-family: 'Dancing Script', cursive; color: var(--pink); font-size: 1.8rem; }

        /* Ana Alan */
        section { padding: 120px 10%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; text-align: center; }
        h1 { font-size: 3rem; color: var(--pink); margin-bottom: 20px; }
        
        /* Tablo Alanı */
        .table-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--pink); width: 100%; max-width: 800px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; color: white; }
        th, td { padding: 12px; border-bottom: 1px solid rgba(255,183,197,0.3); text-align: left; }
        th { color: var(--pink); }

        /* Kedi */
        .cat-box { position: fixed; bottom: 20px; right: 20px; font-size: 50px; cursor: pointer; z-index: 2000; filter: drop-shadow(0 0 10px var(--pink)); }
        
        /* Çiçekler */
        .flower { position: fixed; top: -50px; z-index: -1; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="cat-box" onclick="kediKonus()">🐱</div>

    <nav>
        <div class="logo">Ayşe Gül Ilhan</div>
        <div style="color: var(--pink);">🌸 Flower & Tech</div>
    </nav>

    <section id="main">
        <h1>Hoş Geldin! 🌸</h1>
        <p style="font-size: 1.5rem; font-family: 'Dancing Script', cursive;">Geleceğin Yazılımcısı & Kedi Sever</p>
        
        <div class="table-card">
            <h3>📊 Eğitim & Yetenekler</h3>
            <table>
                <tr><th>Konu</th><th>Seviye</th></tr>
                <tr><td>Web Tasarımı</td><td>🌸 İleri Seviye</td></tr>
                <tr><td>Python</td><td>🐾 Temel</td></tr>
                <tr><td>Veri Yapıları</td><td>🌱 Orta</td></tr>
            </table>
        </div>
    </section>

    <script>
        // Kedi Mesajları
        function kediKonus() {
            const mesajlar = ["Miyav! Kodların düzeldi sanırım! 🐾", "Ayşe Gül çok iyi kod yazar! 😎", "Buralar şimdi çok daha güzel oldu! 🌸"];
            alert(mesajlar[Math.floor(Math.random() * mesajlar.length)]);
        }

        // Çiçek Yağmuru
        function createFlower() {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            flower.innerHTML = "🌸";
            flower.style.left = Math.random() * 100 + "vw";
            flower.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(flower);
            setTimeout(() => { flower.remove(); }, 5000);
        }
        setInterval(createFlower, 700);
    </script>
</body>
</html>
